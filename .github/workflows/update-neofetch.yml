name: Update Neofetch SVG

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add neofetch.svg README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update GitHub stats and README cache" && git push)
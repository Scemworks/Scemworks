<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 725" width="800" height="725">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e13;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <style>
      .title { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; fill: #e6edf3; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #58a6ff; }
      .colon { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #8b949e; }
      .value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: bold; fill: #e6edf3; }
      .highlight { fill: #e6edf3; font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: bold; text-anchor: middle; }
      /* Animation styles */
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animated-block {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      /* Neofetch takes ~2.65s to finish, so we start after that */
      .block-1 { animation-delay: 2.8s; }
      .block-2 { animation-delay: 3.1s; }
      .block-3 { animation-delay: 3.4s; }
    </style>
  </defs>

  <!-- BLOCK 1: GitHub Stats -->
  <g transform="translate(0, 0)" filter="url(#shadow)">
    <g class="animated-block block-1">
    
    <rect x="0" y="0" width="800" height="215" rx="12" ry="12" fill="#1c2128" />
    <rect x="0" y="0" width="800" height="38" rx="12" ry="12" fill="url(#headerGrad)" />
    <rect x="0" y="20" width="800" height="18" fill="url(#headerGrad)" />
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <rect x="0" y="38" width="800" height="177" rx="12" ry="12" fill="url(#termBg)" />
    <rect x="0" y="0" width="800" height="215" rx="12" ry="12" fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

    <text x="30" y="70" class="title"><tspan fill="#3fb950">Mohammed Shadin</tspan><tspan fill="#8b949e">'s </tspan><tspan fill="#58a6ff">GitHub Stats</tspan></text>
    
    <text x="30" y="105"><tspan class="label">Total Stars Earned</tspan><tspan class="colon">    : </tspan><tspan class="value">0</tspan></text>
    <text x="30" y="130"><tspan class="label">Total Commits</tspan><tspan class="colon">         : </tspan><tspan class="value">302 </tspan><tspan fill="#8b949e" font-size="12">(Inc. Private)</tspan></text>
    <text x="30" y="155"><tspan class="label">Total PRs</tspan><tspan class="colon">             : </tspan><tspan class="value">9</tspan></text>
    <text x="30" y="180"><tspan class="label">Contributed to (last year): </tspan><tspan class="value">3</tspan></text>
    <text x="360" y="105"><tspan class="label">Total Issues</tspan><tspan class="colon">          : </tspan><tspan class="value">5</tspan></text>

    <!-- Rank Badge -->
    <g transform="translate(680, 115)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#21262d" stroke-width="8" />
      <circle cx="0" cy="0" r="40" fill="none" stroke="#3fb950" stroke-width="8" stroke-dasharray="251.3272" stroke-dashoffset="175.92904" transform="rotate(-90)" />
      <text x="0" y="10" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="bold" fill="#e6edf3" text-anchor="middle">C</text>
    </g>
    </g>
  </g>

  <!-- BLOCK 2: Streaks -->
  <g transform="translate(0, 245)" filter="url(#shadow)">
    <g class="animated-block block-2">
    
    <rect x="0" y="0" width="800" height="190" rx="12" ry="12" fill="#1c2128" />
    <rect x="0" y="0" width="800" height="38" rx="12" ry="12" fill="url(#headerGrad)" />
    <rect x="0" y="20" width="800" height="18" fill="url(#headerGrad)" />
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <rect x="0" y="38" width="800" height="152" rx="12" ry="12" fill="url(#termBg)" />
    <rect x="0" y="0" width="800" height="190" rx="12" ry="12" fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

    <text x="400" y="24" text-anchor="middle" fill="#8b949e" font-size="13" font-family="'JetBrains Mono', monospace">streak_stats.sh</text>
    
    <!-- Dividers -->
    <line x1="280" y1="60" x2="280" y2="170" stroke="#8b949e" stroke-width="1" opacity="0.4" />
    <line x1="520" y1="60" x2="520" y2="170" stroke="#8b949e" stroke-width="1" opacity="0.4" />

    <!-- Total Contributions -->
    <g transform="translate(160, 110)">
        <text x="0" y="-3" class="highlight">326</text>
        <text x="0" y="50" fill="#e6edf3" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', monospace">Total Contributions</text>
        <text x="0" y="75" fill="#8b949e" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">2021 - Present</text>
    </g>

    <!-- Current Streak -->
    <g transform="translate(400, 110)">
        <!-- Background Track with Gap -->
        <circle cx="0" cy="-15" r="40" fill="none" stroke="#21262d" stroke-width="6" stroke-linecap="round" stroke-dasharray="221.326 30" stroke-dashoffset="-15" transform="rotate(-90 0 -15)" />
        <!-- Orange Progress Ring -->
        <circle cx="0" cy="-15" r="40" fill="none" stroke="#f0883e" stroke-width="6" stroke-linecap="round" stroke-dasharray="73.77533333333332 177.55166666666668" stroke-dashoffset="-15" transform="rotate(-90 0 -15)"  />
        <!-- Flame Icon -->
        <path d="M0,-8 C3,-4 5,-1 5,2 C5,4.8 2.8,7 0,7 C-2.8,7 -5,4.8 -5,2 C-5,-0.5 -2,-3 -1,-5 C-1.5,-4 -2,-2.5 -2,-1 C-2,1 -0.5,2 0.5,2 C1.5,2 2,1 2,-0.5 C2,-1.5 1.5,-3 0 -5 Z" fill="#f0883e" transform="translate(0, -55) scale(1.1)"/>
        
        <text x="0" y="-3" class="highlight" font-size="32">1</text>
        <text x="0" y="50" fill="#f0883e" font-weight="bold" font-size="16" text-anchor="middle" font-family="'JetBrains Mono', monospace">Current Streak</text>
        <text x="0" y="75" fill="#8b949e" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">Jul 13 - Jul 13</text>
    </g>

    <!-- Longest Streak -->
    <g transform="translate(640, 110)">
        <text x="0" y="-3" class="highlight">3</text>
        <text x="0" y="50" fill="#e6edf3" font-size="14" text-anchor="middle" font-family="'JetBrains Mono', monospace">Longest Streak</text>
        <text x="0" y="75" fill="#8b949e" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">Jun 14 - Jun 16</text>
    </g>
    </g>
  </g>

  <!-- BLOCK 3: Languages -->
  <g transform="translate(0, 465)" filter="url(#shadow)">
    <g class="animated-block block-3">
    
    <rect x="0" y="0" width="800" height="240" rx="12" ry="12" fill="#1c2128" />
    <rect x="0" y="0" width="800" height="38" rx="12" ry="12" fill="url(#headerGrad)" />
    <rect x="0" y="20" width="800" height="18" fill="url(#headerGrad)" />
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <rect x="0" y="38" width="800" height="202" rx="12" ry="12" fill="url(#termBg)" />
    <rect x="0" y="0" width="800" height="240" rx="12" ry="12" fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.6"/>

    <text x="400" y="24" text-anchor="middle" fill="#8b949e" font-size="13" font-family="'JetBrains Mono', monospace">languages.sh</text>
    <text x="30" y="65" class="title">Most Used Languages</text>
    
    <g transform="translate(40, 95)">
        <!-- Stacked Bar -->
        <clipPath id="bar-clip">
            <rect x="0" y="0" width="720" height="12" rx="6" />
        </clipPath>
        <g clip-path="url(#bar-clip)">
            <rect x="0" y="0" width="564.3101346268579" height="12" fill="#ff5f57" />
<rect x="564.3101346268579" y="0" width="117.2057793572151" height="12" fill="#ffbd2e" />
<rect x="681.515913984073" y="0" width="20.596093486550288" height="12" fill="#28c840" />
<rect x="702.1120074706233" y="0" width="10.925786620321134" height="12" fill="#58a6ff" />
<rect x="713.0377940909444" y="0" width="6.9622059090555375" height="12" fill="#d2a8ff" />

        </g>
        
        <!-- Language Labels -->
        <g transform="translate(0, 30)">
            
    <g transform="translate(0, 50)">
        <circle cx="6" cy="-1" r="6" fill="#ff5f57" />
        <text x="20" y="4" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b949e">TypeScript 78.4%</text>
    </g>
    
    <g transform="translate(240, 50)">
        <circle cx="6" cy="-1" r="6" fill="#ffbd2e" />
        <text x="20" y="4" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b949e">HTML 16.3%</text>
    </g>
    
    <g transform="translate(480, 50)">
        <circle cx="6" cy="-1" r="6" fill="#28c840" />
        <text x="20" y="4" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b949e">Python 2.9%</text>
    </g>
    
    <g transform="translate(0, 85)">
        <circle cx="6" cy="-1" r="6" fill="#58a6ff" />
        <text x="20" y="4" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b949e">CSS 1.5%</text>
    </g>
    
    <g transform="translate(240, 85)">
        <circle cx="6" cy="-1" r="6" fill="#d2a8ff" />
        <text x="20" y="4" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b949e">JavaScript 1.0%</text>
    </g>
    
        </g>
    </g>
    </g>
  </g>

</svg>